name: AOSPA Marble GKI Kernel (KernelSU + SuSFS)
on:
  workflow_dispatch:
permissions:
  contents: write
env:
  CLANG_DIR: clang-r596125
jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@main
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - name: Set swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16
      - name: Increase file limit
        run: |
          sudo sysctl -w vm.swappiness=100
      - name: Check repository
        uses: actions/checkout@v6.0.2
        with:
          path: aospa-marble-gki-kernel
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex gawk perl cpio tar xz-utils lz4 zstd libelf-dev libssl-dev rsync file git curl wget dwarves build-essential device-tree-compiler python3
          sudo apt-get clean
          sudo curl --create-dirs -o /usr/local/bin/repo -L https://storage.googleapis.com/git-repo-downloads/repo
          sudo chmod a+rx /usr/local/bin/repo
      - name: Clone repo and sync
        run: |
          repo init -u https://github.com/alex18101985/aospa-marble-gki-kernel -b "$(git -C aospa-marble-gki-kernel branch --show-current)" -m manifest.xml --depth=1
          repo sync
          mkdir -p kernel_platform/device/xiaomi/marble-kernel/dtbs
      - name: Cache Clang
        uses: actions/cache@v5.0.5
        with:
          path: kernel_platform/clang
          key: clang-r596125
      - name: Setup Clang
        run: |
          mkdir -p kernel_platform/clang
          cd kernel_platform/clang
          if [ ! -d "${CLANG_DIR}" ]; then
            echo "Clang not found in cache. Downloading..."
            git clone -n --depth=1 --filter=tree:0 -b main-kernel --single-branch \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 .
            git sparse-checkout init --cone
            git sparse-checkout set ${CLANG_DIR}
            git checkout
          else
            echo "Using cached ${CLANG_DIR}"
          fi
      - name: Include KernelSU
        run: |
          cd kernel_platform/xiaomi/sm8450
          rmdir KernelSU
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s 7fb5fd3
      - name: Include SuSFS
        run: |
          HOME="$(pwd)"
          cp -r susfs4ksu/kernel_patches/* kernel_platform/xiaomi/sm8450
          cd kernel_platform/xiaomi/sm8450/KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch
          cd ..
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch
      - name: Include manager signature
        run: |
          set -e
          FILE="kernel_platform/xiaomi/sm8450/KernelSU/kernel/manager/apk_sign.c"
          SIG='check_v2_signature(path, 0x363, "4359c171f32543394cbc23ef908c4bb94cad7c8087002ba164c8230948c21549")'
          sed -i '0,/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH)/{
            s/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH)/check_v2_signature(path, EXPECTED_SIZE, EXPECTED_HASH) || '"$SIG"'/
          }' "$FILE"
      - name: Fix Clang warnings
        run: |
          cp -rf aospa-marble-gki-kernel/android_kernel_xiaomi_sm8450/. kernel_platform/xiaomi/sm8450
          cd kernel_platform/xiaomi/sm8450
          curl https://github.com/LineageOS/android_kernel_xiaomi_sm8450/commit/aea66fe46a3d796d4f85c5979678055438185cbd.patch > clang.patch
          patch -p1 < clang.patch
          curl https://github.com/Pzqqt/android_kernel_xiaomi_marble/commit/f4ae922da12b91d0b7a8109ba2851a44c61b0ba6.patch > clang.patch
          patch -p1 < clang.patch
          cd ..
          curl https://github.com/Pzqqt/android_kernel_xiaomi_marble/commit/3e043c16430a95f6d328f5396c14ec18a52ab10a.patch > clang.patch
          sed -i 's/drivers/sm8450\/drivers/g' clang.patch
          sed -i 's/techpack\/display/sm8450-modules\/qcom\/opensource\/display-drivers/g' clang.patch
          patch -p1 < clang.patch
      - name: Build kernel
        run: |
          cd kernel_platform/xiaomi/sm8450
          export PATH=$PWD/kernel_platform/clang/${CLANG_DIR}/bin:$PATH
          ./build.sh marble --only-kernel
      - name: Zip kernel
        run: |
          git clone --depth=1 -b master https://github.com/alex18101985/AnyKernel3.git AnyKernel3-master
          cd AnyKernel3-master
          cp ../kernel_platform/device/xiaomi/marble-kernel/Image .
          rm -r .git README.md
          find . -type f -name 'placeholder' -delete
          find . -type d -empty -delete
          zip -r9 "../kernel.zip" *
      - name: Generate release tag
        id: tag
        run: echo "release_tag=AOSPA_Marble_GKI_KernelSU_SuSFS_$(date +'%Y.%m.%d_%H%M')" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: |
            kernel.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload kernel artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: kernel
          path: AnyKernel3-master/*
          compression-level: 9
